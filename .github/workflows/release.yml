name: Release

# Builds installers for Linux, macOS, and Windows and publishes a GitHub
# Release when a version tag (e.g. v0.2.0) is pushed. Create the tag with
# ./tag-release.sh after bumping. Each matrix job uploads its artifacts to
# the same release (tauri-action finds-or-creates it by tag).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04        # Linux: .deb / .rpm / .AppImage
            args: ""
          - platform: macos-latest        # macOS: universal .dmg (Intel + Apple Silicon)
            args: "--target universal-apple-darwin"
          - platform: windows-latest       # Windows: .msi / .exe (NSIS)
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal binary needs both arch targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Household Ledger ${{ github.ref_name }}"
          releaseBody: "Automated build. See CHANGELOG.md for what's in this version."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
